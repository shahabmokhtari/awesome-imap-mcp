# Ultimate IMAP MCP - Configuration
# Copy this to config.yaml and edit to your needs.
# Accounts can also be added/edited via the web dashboard.

server:
  transport: stdio              # stdio (for Claude Code/Desktop) | http (for remote MCP clients)
  http_port: 3846               # only used if transport: http
  dashboard_port: 3847          # web dashboard port
  dashboard_enabled: true       # set false to disable the dashboard entirely

accounts:
  # Gmail example (use OAuth2 via dashboard, or app password here)
  - name: personal
    host: imap.gmail.com
    port: 993
    username: you@gmail.com
    auth: app_password          # oauth2 | password | app_password
    # password: xxxx-xxxx-xxxx-xxxx  # Gmail app password (or set via env: ACCOUNT_PERSONAL_PASSWORD)
    smtp:
      host: smtp.gmail.com
      port: 465
      use_ssl: true
    provider: gmail
    sync:
      idle_folders: [INBOX]
      poll_interval: 300        # seconds, for non-IDLE folders
      folders:                  # folders to sync (empty = all)
        - INBOX
        - "[Gmail]/Sent Mail"
        - "[Gmail]/Drafts"

  # Outlook example
  # - name: work
  #   host: outlook.office365.com
  #   port: 993
  #   username: you@company.com
  #   auth: oauth2              # configure OAuth via dashboard
  #   smtp:
  #     host: smtp.office365.com
  #     port: 587
  #     use_ssl: true
  #   provider: outlook
  #   sync:
  #     idle_folders: [INBOX]
  #     poll_interval: 300

  # Generic IMAP example (Fastmail, ProtonMail Bridge, self-hosted, etc.)
  # - name: fastmail
  #   host: imap.fastmail.com
  #   port: 993
  #   username: you@fastmail.com
  #   auth: password
  #   smtp:
  #     host: smtp.fastmail.com
  #     port: 465
  #     use_ssl: true
  #   provider: fastmail        # gmail | outlook | fastmail | protonmail | yahoo | generic
  #   sync:
  #     idle_folders: [INBOX]
  #     poll_interval: 300

cache:
  db_path: ~/.ultimate-imap-mcp/cache.db
  max_size_mb: 500              # max cache database size
  body_fetch: lazy              # lazy = fetch body on demand | eager = fetch body during sync

queue:
  p0_flush_interval: 2         # seconds - sends, replies
  p1_flush_interval: 30        # seconds - delete, move, flag
  p2_flush_interval: 300       # seconds - bulk operations
  send_undo_window: 10         # seconds to cancel a queued send
  max_retries: 3

llm:
  enabled: false                # enable LLM analysis features
  provider: anthropic           # anthropic | openai | openai_compatible
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY  # env var name containing the API key
  # base_url:                   # for openai_compatible provider
  daily_token_budget: 1000000   # max input+output tokens per day (0 = unlimited)
  monthly_cost_limit: 5.00      # max USD per month (0 = unlimited)
  auto_analyze_new: false       # automatically analyze new incoming emails

# TLS settings for self-signed certs (e.g., ProtonMail Bridge)
# tls:
#   reject_unauthorized: false
